<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06D6A0" stop-opacity="0.4"/>
      <stop offset="15%" stop-color="#4ECDC4"/>
      <stop offset="40%" stop-color="#E84393"/>
      <stop offset="65%" stop-color="#FF6B35"/>
      <stop offset="85%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#E84393"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" rx="2"/>

  <!-- Icon -->
  <g transform="translate(80, 100)">
    <circle cx="50" cy="50" r="46" stroke="url(#ring)" stroke-width="1.2" stroke-opacity="0.35" fill="none"/>
    <path d="M8 50 L26 50 L30 50 L34 36 L42 64 L50 28 L58 60 L64 44 L68 50 L92 50" stroke="url(#pulse)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="28" r="3" fill="#E84393" opacity="0.9"/>
    <circle cx="42" cy="64" r="2.5" fill="#4ECDC4" opacity="0.85"/>
  </g>

  <!-- Title -->
  <text x="210" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="#ffffff">Roundcube AI Assistant</text>

  <!-- Subtitle -->
  <text x="210" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="#94a3b8">Compose • Rewrite • Reply • Translate • Summarize • Fix Grammar</text>

  <!-- Tags -->
  <g transform="translate(210, 200)">
    <rect x="0" y="0" width="70" height="26" rx="13" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-width="1"/>
    <text x="35" y="17" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">OpenAI</text>

    <rect x="82" y="0" width="110" height="26" rx="13" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1"/>
    <text x="137" y="17" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#fb923c" text-anchor="middle">Responses API</text>

    <rect x="204" y="0" width="100" height="26" rx="13" fill="#06b6d4" fill-opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
    <text x="254" y="17" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#22d3ee" text-anchor="middle">Roundcube</text>

    <rect x="316" y="0" width="52" height="26" rx="13" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1"/>
    <text x="342" y="17" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#34d399" text-anchor="middle">MIT</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)" rx="2"/>
</svg>
